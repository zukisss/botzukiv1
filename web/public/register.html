<!DOCTYPE html>
<html>

<head>

<title>Register Bot</title>

<link rel="stylesheet" href="/css/style.css">

</head>


<body>


<div class="container">


<div class="card">


<h1>Register Bot</h1>



<input
id="username"
placeholder="Panel Username"
/>



<input
id="password"
type="password"
placeholder="Panel Password"
/>



<textarea
id="appstate"
placeholder="AppState JSON"
></textarea>



<input
id="prefix"
placeholder="Prefix (empty for none)"
/>



<textarea
id="admins"
placeholder="Admins IDs separated by new lines"
></textarea>



<button onclick="register()">
Create Bot
</button>



<p id="message"></p>


</div>


</div>



<script src="/js/app.js"></script>


</body>

</html>
